id: football-fixture-analysis
namespace: production

description: |
  Günlük football fixture analiz pipeline'ı.
  Her sabah 08:00 Istanbul'da çalışır.
  Bugün ve yarın NS maçları için 11 soru cevaplar.
  JSON + Markdown rapor üretir.

inputs:
  - name: date_override
    type: STRING
    required: false
    description: "Test için tarih geçersiz kıl (YYYY-MM-DD). Boşsa bugün+yarın kullanılır."

triggers:
  - id: daily-schedule
    type: io.kestra.core.models.triggers.types.Schedule
    cron: "0 5 * * *"
    # 05:00 UTC = 08:00 Istanbul (UTC+3)
    timezone: "UTC"

tasks:

  # -----------------------------------------------------------------------
  # Stage 1-4: Data Collection
  # -----------------------------------------------------------------------
  - id: collect-data
    type: io.kestra.plugin.scripts.python.Script
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install httpx==0.27.2 pytz==2024.1 -q
    env:
      OUTPUT_PATH: /tmp/raw_data.json
      MAX_WORKERS: "8"
      PAST_FIXTURES_WINDOW: "20"
    containerVolumes:
      - /root/server-scripts/football-analytics/scripts:/app:ro
      - /etc/openclaw/secrets:/etc/openclaw/secrets:ro
      - /tmp:/tmp
    script: |
      import sys
      sys.path.insert(0, '/app')
      exec(open('/app/data_collector.py').read())
    outputFiles:
      - /tmp/raw_data.json

  # -----------------------------------------------------------------------
  # Stage 5: Analysis
  # -----------------------------------------------------------------------
  - id: analyze-fixtures
    type: io.kestra.plugin.scripts.python.Script
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install httpx==0.27.2 pytz==2024.1 -q
    env:
      INPUT_PATH: /tmp/raw_data.json
      OUTPUT_PATH: /tmp/analysis_data.json
    containerVolumes:
      - /root/server-scripts/football-analytics/scripts:/app:ro
      - /tmp:/tmp
    script: |
      import sys
      sys.path.insert(0, '/app')
      exec(open('/app/analyzer.py').read())
    outputFiles:
      - /tmp/analysis_data.json

  # -----------------------------------------------------------------------
  # Stage 6: Output Generation
  # -----------------------------------------------------------------------
  - id: generate-outputs
    type: io.kestra.plugin.scripts.python.Script
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install httpx==0.27.2 pytz==2024.1 -q
      - mkdir -p /output
    env:
      INPUT_PATH: /tmp/analysis_data.json
      OUTPUT_DIR: /output
    containerVolumes:
      - /root/server-scripts/football-analytics/scripts:/app:ro
      - /tmp:/tmp
      - /root/server-scripts/football-analytics/output:/output
    script: |
      import sys
      sys.path.insert(0, '/app')
      exec(open('/app/output_generator.py').read())
    outputFiles:
      - /output/

errors:
  - id: notify-on-error
    type: io.kestra.plugin.core.log.Log
    message: "Football Analysis Pipeline FAILED — {{ task.id }} — {{ errorLogs }}"
    level: ERROR
