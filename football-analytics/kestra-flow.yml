id: football-fixture-analysis
namespace: production

description: |
  Günlük football fixture analiz pipeline.
  Bugün ve yarın NS maçları için 11 soru cevaplar.

triggers:
  - id: daily-schedule
    type: io.kestra.core.models.triggers.types.Schedule
    cron: "0 5 * * *"
    timezone: "UTC"

tasks:

  - id: collect-data
    type: io.kestra.plugin.scripts.python.Script
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install httpx==0.27.2 pytz==2024.1 -q
    env:
      OUTPUT_PATH: /tmp/raw_data.json
      MAX_WORKERS: "8"
      PAST_FIXTURES_WINDOW: "20"
    containerVolumes:
      - /root/server-scripts/football-analytics/scripts:/app:ro
      - /etc/openclaw/secrets:/etc/openclaw/secrets:ro
      - /tmp:/tmp
    script: |
      import sys
      sys.path.insert(0, '/app')
      exec(open('/app/data_collector.py').read())

  - id: analyze-fixtures
    type: io.kestra.plugin.scripts.python.Script
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install httpx==0.27.2 pytz==2024.1 -q
    env:
      INPUT_PATH: /tmp/raw_data.json
      OUTPUT_PATH: /tmp/analysis_data.json
    containerVolumes:
      - /root/server-scripts/football-analytics/scripts:/app:ro
      - /tmp:/tmp
    script: |
      import sys
      sys.path.insert(0, '/app')
      exec(open('/app/analyzer.py').read())

  - id: generate-outputs
    type: io.kestra.plugin.scripts.python.Script
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install httpx==0.27.2 pytz==2024.1 -q
      - mkdir -p /output
    env:
      INPUT_PATH: /tmp/analysis_data.json
      OUTPUT_DIR: /output
    containerVolumes:
      - /root/server-scripts/football-analytics/scripts:/app:ro
      - /tmp:/tmp
      - /root/server-scripts/football-analytics/output:/output
    script: |
      import sys
      sys.path.insert(0, '/app')
      exec(open('/app/output_generator.py').read())

errors:
  - id: notify-on-error
    type: io.kestra.core.tasks.log.Log
    message: "Football Analysis FAILED — {{ task.id }}"
    level: ERROR
